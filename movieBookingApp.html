<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Movie Ticket Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --midnight: #0c1324;
            --ink: #11131f;
            --mist: #f7f4f0;
            --sunset: #ff7a59;
            --lagoon: #2ec4b6;
            --banana: #ffd166;
            --berry: #ef476f;
            --teal-50: #e9fbf9;
        }

        body {
            font-family: "Space Grotesk", sans-serif;
            background: radial-gradient(circle at top, #ffffff, var(--mist) 40%, #f1efe9 100%);
            color: var(--ink);
            min-height: 100vh;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            background: linear-gradient(120deg, rgba(46, 196, 182, 0.18), rgba(255, 209, 102, 0.22));
            padding: 3.5rem 2.5rem;
            box-shadow: 0 25px 60px rgba(17, 19, 31, 0.12);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: -30% -10% auto auto;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(255, 122, 89, 0.45), transparent 60%);
            border-radius: 50%;
            filter: blur(10px);
            animation: float 8s ease-in-out infinite;
        }

        .hero h1 {
            font-family: "Syne", sans-serif;
            font-size: clamp(2.2rem, 3.4vw, 3.2rem);
            margin-bottom: 0.8rem;
        }

        .hero p {
            max-width: 520px;
            font-size: 1.05rem;
            color: rgba(17, 19, 31, 0.75);
        }

        .ticket-badge {
            background: var(--midnight);
            color: #fff;
            border-radius: 999px;
            padding: 0.5rem 1.1rem;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
        }

        .section-title {
            font-family: "Syne", sans-serif;
            font-size: 1.35rem;
            margin-bottom: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(17, 19, 31, 0.08);
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(17, 19, 31, 0.08);
            backdrop-filter: blur(8px);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            animation: rise 0.9s ease forwards;
            opacity: 0;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 50px rgba(17, 19, 31, 0.12);
        }

        .movie-card {
            border-radius: 18px;
            overflow: hidden;
            height: 100%;
            border: 1px solid rgba(17, 19, 31, 0.05);
        }

        .movie-card .card-header {
            background: linear-gradient(135deg, rgba(239, 71, 111, 0.12), rgba(255, 209, 102, 0.28));
            border: none;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .movie-card .price-tag {
            background: var(--teal-50);
            color: var(--lagoon);
            font-weight: 600;
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .pill-time {
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            background: #fff;
            border: 1px solid rgba(17, 19, 31, 0.1);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .pill-time.active {
            background: var(--midnight);
            color: #fff;
            border-color: var(--midnight);
        }

        .form-panel {
            background: linear-gradient(150deg, rgba(255, 122, 89, 0.15), rgba(46, 196, 182, 0.15));
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(17, 19, 31, 0.08);
        }

        .btn-brand {
            background: var(--midnight);
            color: #fff;
            border-radius: 999px;
            padding: 0.6rem 1.4rem;
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-brand:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(12, 19, 36, 0.3);
            /* color: #fff; */
        }

        .fade-in {
            animation: fadeIn 1s ease forwards;
            opacity: 0;
        }

        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 0.4s;
        }

        .delay-3 {
            animation-delay: 0.6s;
        }

        .delay-4 {
            animation-delay: 0.8s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(-20px, 15px, 0);
            }
        }

        @keyframes rise {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <script src="movieBookingApp.js"></script>
    <div class="container py-4 py-lg-5">
        <section class="hero mb-5">
            <div
                class="d-flex flex-column flex-lg-row align-items-start align-items-lg-center justify-content-between gap-4">
                <div>
                    <span class="ticket-badge">NOW SHOWING</span>
                    <h1 class="mt-3">Movie Ticket Booking</h1>
                </div>
                <div class="text-lg-end">
                    <div class="fw-semibold">Today</div>
                    <div class="h4 mb-0">Grand Cinema Hall</div>
                    <div class="text-muted">Downtown Screen 01</div>
                </div>
            </div>
        </section>

        <div class="row g-4">
            <div class="col-12 col-lg-4">
                <div class="form-panel h-100 fade-in delay-1">
                    <h2 class="section-title">Create a Movie</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Movie Name</label>
                            <input type="text" class="form-control" placeholder="Movie name" id="movie"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="3" placeholder="Short description" id="desc"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rate</label>
                            <input type="text" class="form-control" placeholder="e.g. 250" id="rate"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Show Times</label>
                            <div class="d-flex flex-wrap gap-2">
                                <div class="form-check pill-time">
                                    <input class="form-check-input" type="checkbox" id="show1" onchange="addShows(event,'8 am - 10 am')"/>
                                    <label class="form-check-label" for="show1">8 am - 10 am</label>
                                </div>
                                <div class="form-check pill-time">
                                    <input class="form-check-input" type="checkbox" id="show2" onchange="addShows(event,'10 am - 12 pm')"/>
                                    <label class="form-check-label" for="show2">10 am - 12 pm</label>
                                </div>
                                <div class="form-check pill-time">
                                    <input class="form-check-input" type="checkbox" id="show3" onchange="addShows(event,'12 pm - 2 pm')"/>
                                    <label class="form-check-label" for="show3">12 pm - 2 pm</label>
                                </div>
                                <div class="form-check pill-time">
                                    <input class="form-check-input" type="checkbox" id="show4" onchange="addShows(event,'2 pm - 5 pm')"/>
                                    <label class="form-check-label" for="show4">2 pm -5 pm</label>
                                </div>
                                <div class="form-check pill-time">
                                    <input class="form-check-input" type="checkbox" id="show5" onchange="addShows(event,'5 pm - 8 pm')"/>
                                    <label class="form-check-label" for="show5">5 pm - 8 pm</label>
                                </div>
                                <div class="form-check pill-time">
                                    <input class="form-check-input" type="checkbox" id="show6" onchange="addShows(event,'8 pm - 11 pm')"/>
                                    <label class="form-check-label" for="show6">8 pm - 11 pm</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="button" class="btn btn-brand" onclick="addMovie()">Add Movie</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="row g-4">
                    <div class="col-12">
                        <h2 class="section-title">Trending Movies</h2>
                    </div>
                    <div id="trendingMovies" class="col-12">
                        
                    </div>
                </div>
            </div>
        </div>

        <section class="mt-5">
            <div class="row g-4 align-items-stretch">
                <div class="col-12 col-lg-7">
                    <div class="glass-card p-4 fade-in delay-2">
                        <h2 class="section-title">Book Movie Tickets</h2>
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label">Customer Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Ananya Patel" />
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" placeholder="e.g. 9876543210" />
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Choose Movie</label>
                                <select id="city" class="form-select">
                                    <option value="sd">Solar Drift</option>
                                    <option value="eor">Echoes of Rain</option>
                                    <option value="nh">Neon Harbor</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Select Showtime</label>
                                <select class="form-select">
                                    <option selected>10:00 AM - 12:00 PM</option>
                                    <option>12:30 PM - 02:30 PM</option>
                                    <option>04:00 PM - 06:00 PM</option>
                                    <option>08:00 PM - 10:00 PM</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Select Seats</label>
                                <input type="number" class="form-control" value="2" min="1" max="50" />
                            </div>
                        </div>
                        <div class="mt-4 d-flex flex-column flex-md-row gap-3">
                            <button class="btn btn-brand">Book Tickets</button>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-lg-5">
                    <div class="glass-card p-4 fade-in delay-3">
                        <h2 class="section-title">Booking Summary</h2>
                        <div class="mb-3">
                            <div class="text-muted">Movie</div>
                            <div class="fw-semibold">Solar Drift</div>
                        </div>
                        <div class="mb-3">
                            <div class="text-muted">Showtime</div>
                            <div class="fw-semibold">10:00 AM - 12:00 PM</div>
                        </div>
                        <div class="mb-3">
                            <div class="text-muted">Seats</div>
                            <div class="fw-semibold">2 Tickets</div>
                        </div>
                        <div class="mb-4">
                            <div class="text-muted">Total</div>
                            <div class="display-6 fw-semibold">Rs. 28</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
